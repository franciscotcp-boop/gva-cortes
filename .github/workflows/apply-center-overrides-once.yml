name: Aplicar centros geolocalizados una vez

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: aplicar-centros-geolocalizados
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      OVERRIDES_B64: 
      UPDATER_B64: 
      TESTS_B64: 
    steps:
      - name: Obtener repositorio
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Instalar archivos validados
        shell: bash
        run: |
          printf '%s' "$OVERRIDES_B64" | base64 --decode > data/center_overrides.json
          printf '%s' "$UPDATER_B64" | base64 --decode > scripts/update_adjudicaciones.py
          printf '%s' "$TESTS_B64" | base64 --decode > tests/test_update_adjudicaciones.py
          sed -i 's/\r$//' data/center_overrides.json scripts/update_adjudicaciones.py tests/test_update_adjudicaciones.py

      - name: Incorporar las fichas sin alterar los cortes
        shell: bash
        run: |
          node <<'NODE'
          const { createHash } = require('node:crypto');
          const { readFileSync, writeFileSync } = require('node:fs');
          const dataPath = 'data/adjudicaciones.json';
          const overridesPath = 'data/center_overrides.json';
          const data = JSON.parse(readFileSync(dataPath, 'utf8'));
          const overridesDoc = JSON.parse(readFileSync(overridesPath, 'utf8'));
          const beforeCuts = JSON.stringify(data.cuts);
          const beforeRest = JSON.stringify({ ...data, centers: [] });
          const beforeCount = data.centers.length;
          if (JSON.stringify(data.center_format) !== JSON.stringify(overridesDoc.center_format)) throw new Error('center_format incompatible');
          const positions = new Map(data.centers.map((row, index) => [String(row[0]), index]));
          let added = 0;
          for (const row of overridesDoc.centers) {
            const code = String(row[0]);
            const index = positions.get(code);
            if (index === undefined) {
              positions.set(code, data.centers.length);
              data.centers.push(row);
              added += 1;
            } else {
              data.centers[index] = row;
            }
          }
          writeFileSync(dataPath, JSON.stringify(data), 'utf8');
          const checked = JSON.parse(readFileSync(dataPath, 'utf8'));
          if (JSON.stringify(checked.cuts) !== beforeCuts) throw new Error('Se alteraron los cortes');
          if (JSON.stringify({ ...checked, centers: [] }) !== beforeRest) throw new Error('Se alteraron metadatos ajenos a centers');
          if (beforeCount !== 3851 || added !== 19 || checked.centers.length !== 3870) throw new Error('Total de centros inesperado');
          const byCode = new Map(checked.centers.map((row) => [String(row[0]), row]));
          for (const expected of overridesDoc.centers) {
            if (JSON.stringify(byCode.get(String(expected[0]))) !== JSON.stringify(expected)) throw new Error('Ficha manual distinta: ' + expected[0]);
          }
          const cutCodes = new Set([...checked.cuts.inicio.rows, ...checked.cuts.curso.rows].map((row) => String(row[0])));
          const missing = [...cutCodes].filter((code) => {
            const row = byCode.get(code);
            return !row || !Number.isFinite(row[14]) || !Number.isFinite(row[15]);
          });
          if (cutCodes.size !== 1449 || missing.length) throw new Error('Centros adjudicados sin geolocalizacion: ' + missing.join(', '));
          const digest = createHash('sha256').update(JSON.stringify(checked.cuts)).digest('hex');
          if (digest !== 'e3b8d6e93404171bd6b039b159457c27f256d34d544f157f3f02bfd11b9b1643') throw new Error('Huella de cortes inesperada');
          console.log('Centros: 3851 -> 3870; cortes intactos; 1449 codigos geolocalizados.');
          NODE

      - name: Instalar dependencias de prueba
        run: python -m pip install -r requirements.txt

      - name: Verificar actualizador y base
        run: |
          python -m unittest discover -s tests -v
          python -m py_compile scripts/update_adjudicaciones.py tests/test_update_adjudicaciones.py
          git diff --check

      - name: Publicar de forma atomica
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm -- .github/workflows/apply-center-overrides-once.yml
          git add -- data/adjudicaciones.json data/center_overrides.json scripts/update_adjudicaciones.py tests/test_update_adjudicaciones.py
          git commit -m 'Geolocalizar extensiones y preservar centros manuales'
          git push origin HEAD:main
