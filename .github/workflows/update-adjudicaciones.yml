name: Actualizar adjudicaciones

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Forzar una comprobacion"
        required: false
        type: choice
        default: auto
        options:
          - auto
          - inicio
          - curso
          - all
      school_year:
        description: "Curso objetivo opcional, por ejemplo 2025-2026"
        required: false
        type: string
        default: ""
  schedule:
    # GitHub usa UTC. El script decide el calendario real con zona Europe/Madrid.
    # Julio y agosto: busca adjudicaciones de inicio de curso cada 5 minutos.
    # Se desplaza a :02, :07, :12... para evitar los minutos mas saturados de GitHub Actions.
    - cron: "2-59/5 * * 7,8 *"
    # Septiembre-junio: cubre martes y jueves en horario peninsular, con margen UTC.
    - cron: "2-59/5 * * 1-6,9-12 1,2,3,4,5"

permissions:
  contents: write

jobs:
  update-json:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v7

      - name: Preparar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependencias
        run: python -m pip install -r requirements.txt

      - name: Actualizar JSON
        env:
          FORCE_MODE: ${{ github.event.inputs.force || 'auto' }}
          SCHOOL_YEAR: ${{ github.event.inputs.school_year || '' }}
        run: |
          args=()
          if [ -n "$SCHOOL_YEAR" ]; then
            args+=(--school-year "$SCHOOL_YEAR")
          fi
          if [ "$FORCE_MODE" != "auto" ]; then
            args+=(--force "$FORCE_MODE")
          fi
          if [ "${#args[@]}" -gt 0 ]; then
            python scripts/update_adjudicaciones.py "${args[@]}"
          else
            python scripts/update_adjudicaciones.py
          fi

      - name: Guardar cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/adjudicaciones.json
          if git diff --cached --quiet; then
            echo "No hay cambios que guardar."
          else
            git commit -m "Actualizar adjudicaciones"
            git push
          fi
