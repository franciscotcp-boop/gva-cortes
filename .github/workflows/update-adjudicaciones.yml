name: Actualizar adjudicaciones
run-name: Actualizar adjudicaciones (${{ github.event_name }})

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Forzar una comprobacion"
        required: false
        type: choice
        default: auto
        options:
          - auto
          - inicio
          - curso
          - all
      school_year:
        description: "Curso objetivo opcional, por ejemplo 2025-2026"
        required: false
        type: string
        default: ""
  schedule:
    # Cada cuatro horas. La primera tarea aplica el calendario de Espana.
    - cron: "17 */4 * * *"

permissions:
  contents: write

concurrency:
  group: actualizar-adjudicaciones
  cancel-in-progress: false

jobs:
  update-json:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Comprobar calendario
        id: calendar
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" != "schedule" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          month=$(TZ=Europe/Madrid date +%-m)
          weekday=$(TZ=Europe/Madrid date +%u)
          if (( month == 7 || month == 8 )); then
            echo "run=true" >> "$GITHUB_OUTPUT"
          elif (( (month >= 1 && month <= 6) || (month >= 9 && month <= 12) )) && (( weekday == 2 || weekday == 4 )); then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Descargar repositorio
        if: steps.calendar.outputs.run == 'true'
        uses: actions/checkout@v7

      - name: Preparar Python
        if: steps.calendar.outputs.run == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependencias
        if: steps.calendar.outputs.run == 'true'
        run: python -m pip install -r requirements.txt

      - name: Comprobar extractor
        if: steps.calendar.outputs.run == 'true'
        run: python -m unittest discover -s tests -v

      - name: Actualizar JSON
        if: steps.calendar.outputs.run == 'true'
        env:
          FORCE_MODE: ${{ github.event.inputs.force || 'auto' }}
          SCHOOL_YEAR: ${{ github.event.inputs.school_year || '' }}
          HTTP_TIMEOUT_SECONDS: "120"
          SOURCE_RETRY_WINDOW_SECONDS: "1800"
          SOURCE_RETRY_TIMEOUT_SECONDS: "600"
          SOURCE_RETRY_DELAY_SECONDS: "30"
        run: |
          args=()
          if [ -n "$SCHOOL_YEAR" ]; then
            args+=(--school-year "$SCHOOL_YEAR")
          fi
          if [ "$FORCE_MODE" != "auto" ]; then
            args+=(--force "$FORCE_MODE")
          fi
          if [ "${#args[@]}" -gt 0 ]; then
            python scripts/update_adjudicaciones.py "${args[@]}"
          else
            python scripts/update_adjudicaciones.py
          fi

      - name: Guardar cambios
        if: steps.calendar.outputs.run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/adjudicaciones.json data/posiciones_bolsa.json data/position_context_state.json
          if git diff --cached --quiet; then
            echo "No hay cambios que guardar."
          else
            git commit -m "Actualizar adjudicaciones"
            git push
          fi
